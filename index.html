<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEB PAGE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="h-28 bg-white border-b-[5px] border-r-[5px] border-l-[5px] border-t-[5px] border-red-500 flex items-center justify-between px-6"> 
    <div class="flex items-center gap-3">
  <img src="./ChatGPT Image May 31, 2026, 04_08_07 PM.png"></div>
       <h1 class="font-bold text-5xl pr-6">WEB PAGE <span class="text-red-600">BUILDER</span></h1>
    </div>
    <div class="flex gap-3">
      <button onclick="openExport()" class=" h-16 px-6 py-2 bg-black text-white rounded-xl">Export Code</button>
  </header>
</div>
  <div class="flex h-[calc(100vh-64px)]">
    <div class="w-72 bg-white border-r-[6px] border-l-[6px] border-b-[6px] border-red-500 p-5 overflow-auto">
      <h3 class="font-bold mb-4 text-2xl"><span class="text-red-600">COMPONENTS</span></h3> 
      <div class="space-y-2">
  <div class="element p-5 border-[4px] border-red-500 bg-red-500 text-white font-bold rounded-2xl cursor-grab" draggable="true" data-type="header">HEADER SECTION</div>
  <div class="element p-5 border-[4px] border-red-500 bg-red-500 text-white font-bold rounded-2xl cursor-grab" draggable="true" data-type="heading">HEADING H1-H6</div>
  <div class="element p-5 border-[4px] border-red-500 bg-red-500 text-white font-bold rounded-2xl cursor-grab" draggable="true" data-type="paragraph">PARAGRAPH</div>
  <div class="element p-5 border-[4px] border-red-500 bg-red-500 text-white font-bold rounded-2xl cursor-grab" draggable="true" data-type="button">BUTTON</div>
  <div class="element p-5 border-[4px] border-red-500 bg-red-500 text-white font-bold rounded-2xl cursor-grab" draggable="true" data-type="box"> CARD</div>
  <div class="element p-5 border-[4px] border-red-500 bg-red-500 text-white font-bold rounded-2xl cursor-grab" draggable="true" data-type="footer">FOOTER</div>
</div></div>

    <div id="editorCanvas" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

   <div class="w-72 bg-white border-l-[6px] border-r-[6px] border-b-[6px] border-red-500 p-5 overflow-auto">
      <h3 class="font-bold mb-4 text-2xl"><span class="text-red-600">PROPERTIES</span></h3>

      <div class="space-y-5" id="propsPanel">
        <p class="text-gray-500 text-sm">Select an element to edit</p>
      </div>
    </div>
  <div id="exportModal" class="p-6">
    <div class="bg-white rounded-2xl p-6 w-full max-w-3xl max-h- overflow-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Export Code</h2>
                <button onclick="closeExport()" class="text-2xl">&times;</button>
      </div>
      <div class="space-y-4">
        <div>
          <div class="flex justify-between mb-2">
            <label class="font-semibold">index.html</label>
            <button onclick="copyCode('htmlCode')" class="px-3 py-1 bg-red-600 text-white rounded">Copy</button>
          </div>
          <div class="code-box" id="htmlCode"></div>
        </div>
        <div>
          <div class="flex justify-between mb-2">
            <label class="font-semibold">style.css</label>
            <button onclick="copyCode('cssCode')" class="px-3 py-1 bg-red-600 text-white rounded">Copy</button>
          </div>
          <div class="code-box" id="cssCode"></div>
        </div>
        <div>
          <div class="flex justify-between mb-2">
            <label class="font-semibold">script.js</label>
            <button onclick="copyCode('jsCode')" class="px-3 py-1 bg-red-600 text-white rounded">Copy</button>
          </div>
          <div class="code-box" id="jsCode"></div>
        </div>
        <button onclick="downloadAll()" class="w-full py-3 bg-gradient-to-r from-red-500 to-rose-600 text-white rounded-xl font-bold">Download All 3 Files</button>
      </div>
    </div>
  </div>
  <script src="./server.js"></script>
<!-- Export Modal -->
<div id="exportModal">
  <div class="modal-content">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-white">Export Code</h2>
      <button onclick="closeExport()" class="text-4xl text-gray-400 hover:text-white transition">&times;</button>
    </div>
    <div class="space-y-5">
      <div>
               <div class="flex justify-between mb-2">
          <label class="font-semibold text-lg text-white">index.html</label>
          <button onclick="copyCode('htmlCode')" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">Copy</button>
        </div>
        <pre class="code-box" id="htmlCode"></pre>
      </div>
      <div>
        <div class="flex justify-between mb-2">
          <label class="font-semibold text-lg text-white">style.css</label>
          <button onclick="copyCode('cssCode')" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">Copy</button>
        </div>
        <pre class="code-box" id="cssCode"></pre>
      </div>
      <div>
        <div class="flex justify-between mb-2">
          <label class="font-semibold text-lg text-white">script.js</label>
          <button onclick="copyCode('jsCode')" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">Copy</button>
        </div>
        <pre class="code-box" id="jsCode"></pre>
      </div>
      <button onclick="downloadAll()" class="w-full py-4 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-xl font-bold text-lg hover:shadow-lg transition">Download All 3 Files 📦</button>
    </div>
  </div>
</div>
</body>
</html>
